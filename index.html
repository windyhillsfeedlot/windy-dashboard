<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windy Hills Feedlot Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
Windy Hills Feedlot & Grow Yard
</div>

<div class="sidebar">

<img class="logo" src="logo.png">

<div class="rate">
<h2>Yardage</h2>
<div class="price">$0.45</div>
<p>/Head/Day</p>
</div>

<div class="rate">
<h2>Doctoring</h2>
<div class="price">$3</div>
</div>

<div class="rate">
<h2>Chute Fee</h2>
<div class="price">$3</div>
</div>

</div>

<div class="panel">

<div class="markets">

<div class="market">
<h3>Feeder Cattle</h3>
<div class="value">Loading...</div>
</div>

<div class="market">
<h3>Live Cattle</h3>
<div class="value">Loading...</div>
</div>

<div class="market">
<h3>Corn</h3>
<div class="value">Loading...</div>
</div>

<div class="market">
<h3>Soybean Meal</h3>
<div class="value">Loading...</div>
</div>

</div>

</div>

<div class="panel weather">
<h2>Weather</h2>
<div class="temp">--°</div>
<p>Loading weather...</p>
</div>

<div class="bottom">

<div class="feed">
<h3>Corn</h3>
<p>$0.00</p>
</div>

<div class="feed">
<h3>Distillers</h3>
<p>$0.00</p>
</div>

<div class="feed">
<h3>Protein</h3>
<p>$0.00</p>
</div>

<div class="feed">
<h3>Mineral</h3>
<p>$0.00</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
